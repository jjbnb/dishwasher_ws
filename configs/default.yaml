# Default configuration (Level 1 defaults)
# Override with level-specific config for Level 2/3

robot:
  type: "piper"
  usd_path: "assets/isaac_dishwisher/piper/piper_description_v100_realsense_camera_v2.usd"
  control_mode: "joint_position"
  ik_method: "dls"

camera:
  top_down:
    height: 480
    width: 640
    position: [0.0, 0.0, 2.5]
    look_at: [0.0, 0.0, 0.5]
    data_types: ["rgb", "distance_to_image_plane"]

scene:
  usd_path: "assets/isaac_dishwisher/all.usd"
  num_objects: 3
  object_type: "plate"

perception:
  method: "template_matching"

grasping:
  strategy: "fixed"
  approach_height: 0.15
  gripper_open: 0.04
  gripper_closed: 0.0

state_machine:
  max_retries: 0
  cycle_timeout: 10.0
