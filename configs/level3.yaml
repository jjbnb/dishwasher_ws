# Level 3 配置：RL/IL 增强策略
# 场景：透明玻璃杯 + 高反光勺子 + 堆叠 + 纹理干扰

robot:
  type: "piper"
  usd_path: "assets/isaac_dishwisher/piper/piper_description_v100_realsense_camera_v2.usd"
  control_mode: "ik_absolute"
  ik_method: "dls"

camera:
  top_down:
    height: 640
    width: 848            # 更高分辨率
    position: [0.0, 0.0, 2.5]
    look_at: [0.0, 0.0, 0.5]
    data_types: ["rgb", "distance_to_image_plane", "instance_segmentation_fast", "normals"]
  wrist:
    height: 320
    width: 424
    data_types: ["rgb", "distance_to_image_plane", "normals"]

scene:
  usd_path: "assets/isaac_dishwisher/all.usd"
  num_objects: 5
  object_types: ["plate", "bowl", "cup_glass", "spoon_reflective", "bowl_small"]
  clutter: true          # cluttered stacking
  occlusion: true

perception:
  method: "multimodal_fusion"
  depth_completion: true   # for transparent objects
  multi_view_fusion: true  # for reflective objects
  depth_layering: true     # for cluttered scenes
  confidence_threshold: 0.6
  active_sensing: true     # re-observe when confidence low

grasping:
  strategy: "rl_enhanced"  # RL-trained or rule-enhanced
  force_based: true        # force feedback for grasp verification
  max_candidates: 50

motion:
  collision_check: true
  trajectory_type: "linear_interpolation"
  force_threshold: 10.0    # stop on contact force exceed
  waypoints: 20

domain_randomization:
  light_intensity: [0.1, 4.0]
  light_color_temp: [2000, 8000]
  object_color_range: [0.0, 1.0]
  friction_range: [0.1, 1.0]
  mass_variation: 0.3
  background_texture: true # wood/marble/solid

state_machine:
  max_retries: 3
  skip_on_consecutive_fail: 3
  recovery:
    drop_recovery: true
    collision_recovery: true
  cycle_timeout: 30.0
